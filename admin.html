<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login | Charvi's Maggam Hub</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="../style.css">
<meta name="theme-color" content="#b76e79">
</head>

<body class="admin-bg">

<div class="admin-login-card">
  <img src="../logo.png" class="admin-logo">
  <h2>Admin Login</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button onclick="adminLogin()">Login</button>

<p id="loginMsg" style="color:red;"></p>

<script>
const BACKEND_URL = "https://charvis-backend.onrender.com";

let ADMIN_PASSWORD = "";

function adminLogin() {
  const password = document.getElementById("adminPass").value;

  fetch(`${BACKEND_URL}/admin/bookings`, {
    headers: {
      "Authorization": password
    }
  })
  .then(res => {
    if (res.status === 403) {
      document.getElementById("loginMsg").innerText = "Wrong password!";
    } else {
      ADMIN_PASSWORD = password;
      sessionStorage.setItem("adminPass", password);
      window.location.href = "admin-dashboard.html";
    }
  })
  .catch(() => {
    document.getElementById("loginMsg").innerText = "Server error";
  });
}
</script>
